<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Problem Solver Lite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="solver">
      <header class="header">
        <h1>Circuit Problem Solver Lite</h1>
        <p>纯电阻串联 / 并联电路文本解题器</p>
      </header>

      <section class="panel">
        <h2>输入条件</h2>

        <!-- 输入电源电压，单位为伏特 V -->
        <label for="voltage">电源电压 U / V</label>
        <input id="voltage" type="number" min="0" step="0.01" placeholder="例如：12">

        <!-- 输入多个电阻值，使用逗号分隔 -->
        <label for="resistors">电阻值 R / Ω</label>
        <input id="resistors" type="text" placeholder="例如：10, 20, 30">

        <!-- 选择连接方式：串联或并联 -->
        <label for="connectionType">连接方式</label>
        <select id="connectionType">
          <option value="series">串联</option>
          <option value="parallel">并联</option>
        </select>

        <button id="solveBtn" type="button">生成解题结果</button>
        <p id="message" class="message"></p>
      </section>

      <section class="panel result-panel">
        <h2>计算结果</h2>
        <div class="summary">
          <p>等效电阻：<strong id="equivalentResistance">--</strong></p>
          <p>总电流：<strong id="totalCurrent">--</strong></p>
        </div>

        <!-- 每个电阻的电压和电流会由 JavaScript 自动生成 -->
        <div id="resistorDetails" class="details"></div>
      </section>

      <section class="panel steps-panel">
        <h2>中文解题步骤</h2>
        <ol id="solutionSteps"></ol>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
