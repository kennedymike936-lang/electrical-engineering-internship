<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Problem Solver Lite V2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Circuit Problem Solver Lite V2</h1>
        <p>拼图式电路编辑器：先搭电路图，再保存结构化数据</p>
      </div>
      <button id="clearBtn" class="ghost-button" type="button">清空画布</button>
    </header>

    <section class="workspace">
      <aside class="toolbar" aria-label="元件工具栏">
        <h2>元件工具栏</h2>

        <!-- 工具栏元件：拖拽到右侧画布即可创建对应元件 -->
        <button class="tool-item" type="button" draggable="true" data-type="source">
          <span class="tool-symbol">V</span>
          <span>
            <strong>直流电源</strong>
            <small>默认 12V</small>
          </span>
        </button>

        <button class="tool-item" type="button" draggable="true" data-type="resistor">
          <span class="tool-symbol">R</span>
          <span>
            <strong>电阻</strong>
            <small>默认 10Ω</small>
          </span>
        </button>

        <button class="tool-item" type="button" draggable="true" data-type="capacitor">
          <span class="tool-symbol">C</span>
          <span>
            <strong>电容</strong>
            <small>默认 100uF</small>
          </span>
        </button>

        <button class="tool-item" type="button" draggable="true" data-type="inductor">
          <span class="tool-symbol">L</span>
          <span>
            <strong>电感</strong>
            <small>默认 10mH</small>
          </span>
        </button>

        <button class="tool-item" type="button" draggable="true" data-type="wire">
          <span class="tool-symbol">W</span>
          <span>
            <strong>导线</strong>
            <small>默认 wire</small>
          </span>
        </button>

        <div class="editor-panel">
          <h2>元件编辑</h2>
          <p id="selectedName">未选择元件</p>
          <label for="valueInput">元件数值</label>
          <input id="valueInput" type="text" placeholder="点击画布元件后修改" disabled>
          <button id="applyValueBtn" class="apply-button" type="button" disabled>应用修改</button>
        </div>
      </aside>

      <section class="canvas-area">
        <div class="canvas-title">
          <h2>网格画布</h2>
          <p>把左侧元件拖到这里，点击画布上的元件可以修改数值。</p>
        </div>

        <!-- 画布区域：JavaScript 会把元件渲染到这里 -->
        <div id="canvas" class="circuit-canvas" aria-label="电路编辑画布"></div>
      </section>
    </section>

    <section class="json-panel">
      <div class="json-header">
        <h2>components JSON 数据</h2>
        <span id="countText">0 个元件</span>
      </div>
      <pre id="jsonOutput">[]</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
