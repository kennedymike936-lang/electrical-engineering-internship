<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electrical Power Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="calculator">
      <h1>Electrical Power Calculator</h1>
      <p class="subtitle">电功率计算器</p>

      <!-- 输入区域：用户填写电压、电流和功率因数 -->
      <label for="voltage">电压 V</label>
      <input id="voltage" type="number" min="0" step="0.01" placeholder="例如：220">

      <label for="current">电流 A</label>
      <input id="current" type="number" min="0" step="0.01" placeholder="例如：10">

      <label for="powerFactor">功率因数 cosφ</label>
      <input id="powerFactor" type="number" min="0" max="1" step="0.01" placeholder="例如：0.85">

      <button id="calculateBtn" type="button">计算</button>

      <!-- 结果区域：显示单相功率和三相功率 -->
      <div class="result">
        <p>单相功率：<strong id="singlePhasePower">--</strong></p>
        <p>三相功率：<strong id="threePhasePower">--</strong></p>
      </div>

      <p id="message" class="message"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
